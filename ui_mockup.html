<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmoMirror</title>

    <!-- Preload primary font weight -->
    <link rel="preload" href="https://fonts.gstatic.com/s/outfit/v11/QGYvz_MVcBeNP4NJtEtq.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Typography: Outfit (primary) + Fraunces (editorial accent) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&family=Fraunces:ital,wght@1,300&display=swap" rel="stylesheet">

    <!-- GSAP 3.12.5 + free plugins -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
    <!-- EmoMirror modules -->
    <script src="./tips.js"></script>
    <script src="./biosignal.js"></script>

    <style>
        /* ─── Design Tokens ─────────────────────────────────────────── */
        :root {
            /* Color */
            --bg:               #000000;
            --fg:               #F5F5F7;
            --fg-muted:         #8E8E93;
            --fg-subtle:        #48484A;
            --glass-bg:         rgba(255,255,255,0.06);
            --glass-border:     rgba(255,255,255,0.14);
            --state-storm:      #FF3B30;
            --state-fatigued:   #7A8599;
            --state-calming:    #4AC8FF;
            --state-bloom:      #FFD89E;
            --accent-ring:      rgba(74,200,255,0.55);
            --ambient-color:    rgba(255,59,48,0.10);

            /* Spacing (4pt grid) */
            --sp-1: 0.25rem;
            --sp-2: 0.5rem;
            --sp-3: 0.75rem;
            --sp-4: 1rem;
            --sp-6: 1.5rem;
            --sp-8: 2rem;
            --sp-12: 3rem;

            /* Motion (mirrored as CSS vars; GSAP is the primary consumer) */
            --dur-fast:  180ms;
            --dur-med:   420ms;
            --dur-slow:  1200ms;
            --dur-scene: 2400ms;
        }

        /* ─── Reset ──────────────────────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ─── Canvas ─────────────────────────────────────────────────── */
        #avatarCanvas {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0; /* Hidden during review */
            transition: opacity 1.5s ease-in-out;
        }
        body.in-biofeedback #avatarCanvas {
            opacity: 1; /* Fade in when challenge starts */
        }

        /* ─── Ambient color bleed (between canvas and UI) ────────────── */
        #ambient-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse 60% 70% at 50% 45%, var(--ambient-color), transparent 70%);
            transition: background var(--dur-slow) ease;
        }

        /* ─── UI Overlay ─────────────────────────────────────────────── */
        #ui-layer {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: var(--sp-8);
            text-align: center;
        }

        /* Scenes: hidden via opacity + pointer-events, never display:none */
        .scene {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: var(--sp-8);
            opacity: 0;
            pointer-events: none;
        }
        .scene.active { pointer-events: auto; }

        #scene-review {
            justify-content: space-between;
            padding-top: 6vh;
            padding-bottom: 6vh;
        }

        body.in-review .anatomy-figure {
            height: 50vh;
            opacity: 0 !important;
        }

        /* ─── Typography ─────────────────────────────────────────────── */
        h1 {
            font-weight: 200;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: 0.05em;
            margin-bottom: var(--sp-4);
            text-shadow: 0 0 40px rgba(255,255,255,0.2);
        }

        h2 {
            font-weight: 400;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: var(--fg-muted);
            margin-bottom: var(--sp-8);
            font-family: 'Fraunces', serif;
            font-style: italic;
        }

        /* ─── Timeline ───────────────────────────────────────────────── */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: var(--sp-6);
            margin-bottom: var(--sp-12);
            max-width: 600px;
            width: 100%;
            text-align: left;
        }

        .timeline-item {
            display: flex;
            gap: var(--sp-4);
            opacity: 0; /* GSAP will reveal */
        }

        .time-label {
            font-weight: 600;
            font-size: clamp(0.8rem, 1.5vw, 0.95rem);
            color: #A8A8AD; /* bumped from #888 for ≥4.5:1 contrast */
            min-width: 100px;
            padding-top: 0.2rem;
        }

        .timeline-content {
            border-left: 2px solid rgba(255,255,255,0.15);
            padding-left: var(--sp-6);
        }

        .state-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.82rem;
            margin-bottom: var(--sp-2);
            letter-spacing: 0.04em;
        }
        .badge-rested    { background: rgba(74,200,255,0.15); color: #4AC8FF; border: 1px solid rgba(74,200,255,0.4); }
        .badge-over      { background: rgba(255,59,48,0.15);  color: #FF6B61; border: 1px solid rgba(255,59,48,0.4); }
        .badge-recovering{ background: rgba(255,216,158,0.15); color: #FFD89E; border: 1px solid rgba(255,216,158,0.4); }

        .insight-text-small {
            font-size: 0.9rem;
            color: var(--fg-muted);
            font-weight: 200;
            line-height: 1.55;
            margin-bottom: var(--sp-1);
        }

        .metric {
            font-size: 0.82rem;
            color: var(--fg-subtle);
            margin-top: var(--sp-1);
            font-variant-numeric: tabular-nums;
        }

        /* ─── Buttons ────────────────────────────────────────────────── */
        .actions {
            opacity: 0; /* GSAP will reveal */
        }

        .btn-group {
            display: flex;
            gap: var(--sp-6);
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--fg);
            padding: 0.75rem 2rem;
            min-height: 48px; /* ≥44pt touch target */
            font-family: 'Outfit', sans-serif;
            font-size: clamp(0.9rem, 1.8vw, 1.1rem);
            font-weight: 200;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background var(--dur-fast) ease,
                        border-color var(--dur-fast) ease,
                        box-shadow var(--dur-fast) ease,
                        transform var(--dur-fast) ease;
        }

        button:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.35);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(0,0,0,0.5), 0 0 16px rgba(255,255,255,0.15);
        }

        button:focus-visible {
            outline: 2px solid var(--accent-ring);
            outline-offset: 3px;
        }

        /* ─── Biofeedback Scene ──────────────────────────────────────── */
        #instruction-text {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 200;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.85);
            text-align: center;
            white-space: nowrap;
            opacity: 0;
        }

        /* SVG ring container */
        #ring-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 520px; height: 520px;
            pointer-events: none;
            opacity: 0;
        }

        /* ─── Bloom Scene ────────────────────────────────────────────── */
        .bloom-line {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(1.5rem, 3.5vw, 2.2rem);
            color: var(--state-bloom);
            letter-spacing: 0.06em;
            text-shadow: 0 0 40px rgba(255,216,158,0.4);
            opacity: 0;
        }

        /* ─── Demo Mode chip ─────────────────────────────────────────── */
        #demo-chip {
            position: fixed;
            top: 1.5rem; right: 1.5rem;
            background: rgba(255,216,158,0.12);
            border: 1px solid rgba(255,216,158,0.35);
            color: var(--state-bloom);
            font-family: 'Outfit', sans-serif;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        /* ─── Avatar Image ─────────────────────────────────────── */
        .anatomy-figure {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 75vh;
            width: auto;
            z-index: 2;
            pointer-events: none;
            will-change: transform, filter;
            filter:
                drop-shadow(0 0 4px var(--avatar-color, #4AC8FF))
                drop-shadow(0 0 18px var(--avatar-color, #4AC8FF))
                drop-shadow(0 0 38px rgba(74, 200, 255, 0.35));
            transition: filter 0.3s ease;
        }

        .anatomy-figure img {
            height: 100%;
            width: auto;
            object-fit: contain;
            mix-blend-mode: screen;
            display: block;
        }

        /* RGB-split glitch clones */
        .glitch-r {
            mix-blend-mode: screen;
            filter:
                hue-rotate(-40deg) saturate(2)
                drop-shadow(0 0 6px rgba(255, 59, 48, 0.8));
            opacity: 0;
        }

        .glitch-b {
            mix-blend-mode: screen;
            filter:
                hue-rotate(160deg) saturate(2)
                drop-shadow(0 0 6px rgba(74, 200, 255, 0.8));
            opacity: 0;
        }

        /* ─── Daily Review v2 ────────────────────────────────────────── */
        .review-grid {
            display: grid; grid-template-columns: 1.2fr 1fr; gap: var(--sp-8); width: min(1280px, 94vw);
            text-align: left;
        }
        .dashboard-row {
            display: grid; grid-template-columns: minmax(0, 1fr) 180px; gap: var(--sp-6); align-items: center; padding: var(--sp-4) 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            opacity: 0;
        }
        .dashboard-row:last-child { border-bottom: none; }
        .chart-block { display: flex; flex-direction: column; }
        .chart-label { 
            display: inline-block; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.82rem; margin-bottom: var(--sp-2); letter-spacing: 0.04em;
            background: rgba(255,255,255,0.1); color: var(--fg); align-self: flex-start;
        }
        .sparkline { width: 100%; height: 110px; overflow: visible; }
        .highlight-circle { stroke: currentColor; fill: none; stroke-dasharray: 3 3; r: 6; }
        .highlight-list { display: flex; flex-direction: column; gap: var(--sp-1); margin-top: var(--sp-2); }
        .highlight-callout { display: flex; align-items: center; gap: var(--sp-2); font-size: 0.8rem; color: var(--fg-muted); }
        .gauge-block { display: flex; flex-direction: column; align-items: center; gap: var(--sp-2); }
        .radial-gauge { width: 160px; height: 160px; }
        .gauge-value { font-size: 2.4rem; font-weight: 200; font-variant-numeric: tabular-nums; fill: var(--fg); text-anchor: middle; dominant-baseline: middle; }
        .gauge-label { font-size: 0.65rem; opacity: 0.6; letter-spacing: 0.1em; text-transform: uppercase; fill: var(--fg); text-anchor: middle; }
        .gauge-delta { font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 12px; font-variant-numeric: tabular-nums; }
        .gauge-delta.positive { background: rgba(255,59,48,0.15); color: #FF6B61; }
        .gauge-delta.negative { background: rgba(74,200,255,0.15); color: #4AC8FF; }
        .gauge-delta.neutral { background: rgba(255,255,255,0.1); color: var(--fg); }
        
        .questions-header { font-family: 'Fraunces', serif; font-style: italic; font-size: 1.2rem; color: var(--fg-muted); margin-bottom: var(--sp-4); }
        .question-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px;
            padding: var(--sp-4); margin-bottom: var(--sp-4);
            transition: transform var(--dur-fast);
            opacity: 0;
        }
        .question-card:hover { transform: translateY(-2px); }
        .q-text { font-size: 0.95rem; margin-bottom: var(--sp-3); line-height: 1.4; }
        .q-input-wrap { display: flex; gap: var(--sp-2); }
        .q-input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--fg); padding: var(--sp-2); resize: none; height: 44px; font-family: 'Outfit'; font-size: 0.9rem; }
        .mic-btn { width: 44px; height: 44px; border-radius: 22px; padding: 0; display: flex; justify-content: center; align-items: center; min-height: auto; }
        .mic-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .actions-bottom { margin-top: var(--sp-6); opacity: 0; }

        /* ─── Reduced motion fallback ─────────────────────────────────── */
        @media (prefers-reduced-motion: reduce) {
            .glitch-r, .glitch-b { display: none; }
            .scene { transition: opacity 0ms; }
            button { transition: none; }
            #ambient-layer { transition: none; }
        }

        /* ─── Biofeedback Challenge v2 ───────────────────────────────────── */
        #scene-biofeedback {
            display: grid;
            grid-template-columns: 32fr 44fr 24fr;
            align-items: stretch;
            padding: 0;
            gap: 0;
        }

        /* Left column */
        .bf-left {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: var(--sp-8) var(--sp-4);
            border-right: 1px solid rgba(255,255,255,0.06);
        }

        .tip-panel {
            flex: 1;
            display: flex;
            align-items: flex-start;
            padding-top: 15vh;
            text-align: center;
        }

        .tip-text {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 300;
            font-size: clamp(1.4rem, 2.8vw, 2.2rem);
            color: #F5F5F7;
            line-height: 1.5;
            letter-spacing: 0.02em;
            text-shadow: 0 0 24px rgba(74,200,255,0.35);
        }

        .btn-stop {
            margin-bottom: var(--sp-4);
            background: rgba(255,59,48,0.08);
            border-color: rgba(255,59,48,0.25);
            color: rgba(255,100,90,0.9);
            font-size: 0.9rem;
            padding: 0.6rem 1.8rem;
        }
        .btn-stop:hover {
            background: rgba(255,59,48,0.18);
            border-color: rgba(255,59,48,0.5);
        }

        /* Center column */
        .bf-center {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Box-breathing SVG frame */
        #breath-box-wrap {
            position: relative;
            width: min(56vh, 56vw);
            height: min(56vh, 56vw);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #breath-box-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Side labels */
        .box-label {
            position: absolute;
            font-size: clamp(0.7rem, 1.2vw, 0.9rem);
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--fg-muted);
            opacity: 0.4;
            transition: opacity 0.6s ease, transform 0.6s ease;
            white-space: nowrap;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: var(--sp-2);
        }
        .box-label.active-label {
            opacity: 1;
            color: var(--fg);
        }
        /* Peripheral countdown next to active label */
        .box-label .phase-count {
            font-size: 0.75rem;
            font-variant-numeric: tabular-nums;
            opacity: 0.5;
            font-family: 'Outfit', sans-serif;
        }

        #label-top    { top: -2.2rem;  left: 50%; transform: translateX(-50%); }
        #label-right  { right: -4.5rem; top: 50%; transform: translateY(-50%); }
        #label-bottom { bottom: -2.2rem; left: 50%; transform: translateX(-50%); }
        #label-left   { left: -4.5rem;  top: 50%; transform: translateY(-50%); }

        /* Avatar inside the box */
        /* Right column — HP bar */
        .bf-right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: var(--sp-4);
            padding: var(--sp-8) var(--sp-4);
            border-left: 1px solid rgba(255,255,255,0.06);
        }

        .hp-label {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--fg-muted);
            text-align: center;
        }

        .hp-value {
            font-size: 1.1rem;
            font-variant-numeric: tabular-nums;
            font-weight: 200;
            color: var(--fg);
        }

        .hp-bar-wrap {
            position: relative;
            width: 24px;
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .hp-bar-track {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
        }

        .hp-bar-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            border-radius: 12px;
            background: var(--state-storm);
            height: 0%;
            transition: background 1.5s ease;
            will-change: height;
        }

        /* Target marker line */
        .hp-target-line {
            position: absolute;
            left: -8px;
            right: -8px;
            height: 2px;
            background: rgba(255,255,255,0.35);
            border-radius: 1px;
            /* bottom% set by JS */
        }

        /* Win-hold arc around target marker */
        .hp-win-arc {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            /* bottom set by JS */
        }

        .hp-target-label {
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            text-align: center;
            margin-top: var(--sp-2);
        }

        /* Avatar + glitch clones re-parented into box during challenge */
        #breath-box-wrap .anatomy-figure {
            position: absolute;
            top: 50%;
            left: 50%;
            height: 82%;
            width: auto;
            z-index: 1;
            pointer-events: none;
            /* transform written by GSAP ticker: translate(-50%,-50%) scale(n) */
        }

        /* Green glow when at target */
        .hp-bar-fill.at-target {
            background: #4CD964 !important;
            box-shadow: 0 0 18px rgba(76,217,100,0.6), 0 0 40px rgba(76,217,100,0.25);
        }

        /* Responsive: stack on narrow screens */
        @media (max-width: 900px) {
            #scene-biofeedback {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                overflow-y: auto;
            }
            .bf-left  { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); flex-direction: row; padding: var(--sp-4); justify-content: space-between; }
            .bf-right { border-left: none; border-top: 1px solid rgba(255,255,255,0.06); flex-direction: row; }
            .hp-bar-wrap { height: 24px; width: 40vw; flex-direction: row; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <!-- Avatar canvas (z-index 0) -->
    <canvas id="avatarCanvas"></canvas>

    <!-- Ambient color bleed (z-index 1) -->
    <div id="ambient-layer"></div>

    <div class="anatomy-figure" id="avatar-figure">
      <img src="avatar.png" alt="Holographic Avatar">
    </div>
    <!-- RGB-split glitch clones (aria-hidden) -->
    <div class="anatomy-figure glitch-r" aria-hidden="true">
      <img src="avatar.png" alt="Holographic Avatar">
    </div>
    <div class="anatomy-figure glitch-b" aria-hidden="true">
      <img src="avatar.png" alt="Holographic Avatar">
    </div>

    <!-- SVG ring for biofeedback (z-index 2, positioned absolute) -->
    <div id="ring-container">
        <svg width="520" height="520" viewBox="0 0 520 520" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Track ring (subtle) -->
            <circle cx="260" cy="260" r="250" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
            <!-- Progress ring -->
            <circle id="progress-arc"
                cx="260" cy="260" r="250"
                stroke="rgba(74,200,255,0.55)"
                stroke-width="2"
                stroke-linecap="round"
                fill="none"
                transform="rotate(-90 260 260)"
            />
        </svg>
    </div>

    <!-- UI Overlay (z-index 10) -->
    <div id="ui-layer">

        <!-- Scene 1: Awakening -->
        <div id="scene-review" class="scene">
            <h1>Welcome back.</h1>
            <h2>Here is a reflection of your body today.</h2>

            <div class="review-grid" id="review-grid" aria-live="polite">
                <div class="review-left" id="dashboards-container">
                    <!-- Dashboards injected here -->
                </div>
                <div class="review-right">
                    <div class="questions-header">A few things to reflect on</div>
                    <div id="questions-container">
                        <!-- Questions injected here -->
                    </div>
                    <div class="actions actions-bottom">
                        <div class="btn-group">
                            <button onclick="startBiofeedback()" aria-label="Start biofeedback challenge">Start Biofeedback Challenge</button>
                            <button onclick="dismiss()" aria-label="Dismiss for now">Not now</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scene 2: Biofeedback Challenge -->
        <div id="scene-biofeedback" class="scene">

            <!-- Left: tip panel + quotes + stop button -->
            <div class="bf-left">
                <!-- Somatic tip -->
                <div class="tip-panel">
                    <p class="tip-text" id="bf-tip" aria-live="polite"></p>
                </div>

                <!-- Box breathing quotes -->
                <div class="tip-panel" style="padding-top: 0; padding-bottom: 2vh; border-top: 1px solid rgba(255,255,255,0.06);">
                    <div style="width:100%">
                        <div style="font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--fg-subtle); margin-bottom:0.6rem; text-align:center;">Box Breathing</div>
                        <p class="tip-text" id="bf-quote" aria-live="polite" style="font-size:clamp(1.1rem, 2.2vw, 1.6rem); color:var(--fg-muted);"></p>
                        <p style="font-size:0.7rem; letter-spacing:0.05em; color:var(--fg-subtle); text-align:right; margin-top:0.5rem;" id="bf-quote-author"></p>
                    </div>
                </div>

                <button class="btn-stop" onclick="stopChallenge()" aria-label="Stop biofeedback challenge">Stop</button>
            </div>

            <!-- Center: avatar inside breathing box -->
            <div class="bf-center">
                <div id="breath-box-wrap">
                    <!-- Side labels -->
                    <div class="box-label active-label" id="label-top">
                        Inhale <span class="phase-count" id="count-top"></span>
                    </div>
                    <div class="box-label" id="label-right">
                        Hold <span class="phase-count" id="count-right"></span>
                    </div>
                    <div class="box-label" id="label-bottom">
                        Exhale <span class="phase-count" id="count-bottom"></span>
                    </div>
                    <div class="box-label" id="label-left">
                        Hold <span class="phase-count" id="count-left"></span>
                    </div>

                    <!-- Box frame SVG + dot -->
                    <svg id="breath-box-svg" viewBox="0 0 400 400" fill="none"
                         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <!-- Box frame -->
                        <rect id="breath-rect" x="10" y="10" width="380" height="380"
                              rx="18" ry="18"
                              stroke="rgba(74,200,255,0.45)" stroke-width="2.5" fill="none"/>
                        <!-- Traversing dot -->
                        <circle id="breath-dot" r="9" fill="#4AC8FF" cx="200" cy="10"/>
                    </svg>

                    <!-- avatar-figure is moved here by JS on challenge start -->
                </div>
            </div>

            <!-- Right: RSA HP bar -->
            <div class="bf-right">
                <div class="hp-label">Calm</div>
                <div class="hp-value" id="hp-value-text">— bpm</div>
                <div class="hp-bar-wrap" id="hp-bar-wrap">
                    <div class="hp-bar-track"></div>
                    <div class="hp-bar-fill" id="hp-bar-fill"></div>
                    <div class="hp-target-line" id="hp-target-line" style="bottom: 70%"></div>
                    <svg class="hp-win-arc" id="hp-win-arc"
                         viewBox="0 0 40 40" style="bottom: calc(70% - 20px); display:none">
                        <circle cx="20" cy="20" r="16"
                                fill="none" stroke="rgba(76,217,100,0.5)" stroke-width="2.5"
                                stroke-dasharray="100.5" stroke-dashoffset="100.5"
                                transform="rotate(-90 20 20)"
                                id="hp-win-circle"/>
                    </svg>
                </div>
                <div class="hp-target-label">target</div>
            </div>

        </div>

        <!-- Scene 3: Bloom -->
        <div id="scene-bloom" class="scene" style="flex-direction:column; justify-content:space-between; align-items:center; padding-top:1.5vh; padding-bottom:6vh;">
            <!-- Top: headline + subtitle -->
            <div style="text-align:center; display:flex; flex-direction:column; gap:var(--sp-2); z-index:20; position:relative;">
                <p class="bloom-line" id="bloom-headline" style="opacity:0;">You have reached calm.</p>
                <p style="font-family:'Outfit',sans-serif; font-weight:200; font-size:clamp(0.95rem,2vw,1.3rem); color:var(--fg-muted); letter-spacing:0.04em; opacity:0; max-width:800px; text-align:center; line-height:1.6;" id="bloom-sub">Enjoy the rest of your day.</p>
            </div>
            <!-- Bottom: return button -->
            <button onclick="returnToReview()" style="opacity:0; z-index:20; position:relative;" id="bloom-return-btn">Return to Review</button>
        </div>

    </div>

    <!-- Demo mode chip -->
    <div id="demo-chip">Demo Mode</div>

    <!-- Pre-load data to avoid CORS on file:// -->
    <script src="./review_data.js"></script>
    <script>
        // ─── GSAP Setup ────────────────────────────────────────────────
        gsap.registerPlugin(CustomEase, MotionPathPlugin);
        gsap.defaults({ ease: 'power3.out', duration: 0.6 });

        // Signature eases
        CustomEase.create('emoMirror', 'M0,0 C0.25,0.1 0.25,1 1,1');

        // Reduced motion: disable all GSAP animation
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            gsap.globalTimeline.timeScale(0.001);
        }

        // ─── Canvas Setup ──────────────────────────────────────────────
        const canvas = document.getElementById('avatarCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width  = canvas.width  = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ─── Shared Avatar State (GSAP tweens write; drawFrame reads) ──
        const avatarState = {
            r: 255, g: 59, b: 48,       // ambient color components
            hue:         180,           // image filter hue-rotate
            brightness:  1.0,           // image filter brightness
            fillAlpha:   0.9,
            strokeAlpha: 0.0,
            glitch:      15,
            auraBlur:    50,
            auraBreath:  0,             // sin input
            scale:       1.0,           // canvas scale multiplier tweenable
            droopFactor: 0,
            auraRadius:  0,             // for bloom aura ring
            auraRingAlpha: 0,
        };

        const figureEl  = document.getElementById('avatar-figure');
        const glitchR   = document.querySelector('.glitch-r');
        const glitchB   = document.querySelector('.glitch-b');

        gsap.ticker.add(() => {
            const s = avatarState;
            const col = `rgb(${Math.round(s.r)},${Math.round(s.g)},${Math.round(s.b)})`;
            const root = document.documentElement;
            root.style.setProperty('--avatar-color', col);
            root.style.setProperty('--avatar-opacity', String(Math.max(0.05, s.fillAlpha)));
            root.style.setProperty('--avatar-stroke', String(1.2 + s.strokeAlpha * 1.2));
            root.style.setProperty('--avatar-glow', `${Math.round(s.auraBlur * 0.35)}px`);
            
            // Image color filters
            figureEl.querySelector('img').style.filter = `hue-rotate(${s.hue}deg) brightness(${s.brightness})`;
            glitchR.querySelector('img').style.filter  = `hue-rotate(${s.hue}deg) brightness(${s.brightness})`;
            glitchB.querySelector('img').style.filter  = `hue-rotate(${s.hue}deg) brightness(${s.brightness})`;

            figureEl.style.transform =
                `translate(-50%, -50%) scale(${s.scale})`;
        });

        function glitchTick() {
            if (avatarState.glitch < 0.5) {
                glitchR.style.opacity = '0';
                glitchB.style.opacity = '0';
                return;
            }
            const amt = avatarState.glitch;
            const oR  = (Math.random() - 0.5) * amt * 0.5;
            const oB  = (Math.random() - 0.5) * amt * 0.5;
            const y   = Math.random() * 80;
            const h   = 5 + Math.random() * 20;
            glitchR.style.opacity    = String(0.4 + Math.random() * 0.3);
            glitchB.style.opacity    = String(0.3 + Math.random() * 0.3);
            glitchR.style.transform  = `translate(calc(-50% + ${oR}px), -50%)`;
            glitchB.style.transform  = `translate(calc(-50% + ${oB}px), -50%)`;
            glitchR.style.clipPath   = `inset(${y}% 0 ${Math.max(0, 94 - y - h)}% 0)`;
            glitchB.style.clipPath   = `inset(${Math.min(99, y + h * 1.4)}% 0 ${Math.max(0, 90 - y - h * 2)}% 0)`;
        }
        const glitchInterval = setInterval(glitchTick, 80);

        // Particles for BLOOM
        const particles = [];

        // Progress ring arc (review scene ring — kept for bloom outro)
        const arc    = document.getElementById('progress-arc');
        const circum = 2 * Math.PI * 250;
        arc.style.strokeDasharray  = circum;
        arc.style.strokeDashoffset = circum;

        // ─── Animation Loop ────────────────────────────────────────────
        let time = 0;
        let lastTs = 0;

        function drawFrame(ts) {
            const dt = Math.min((ts - lastTs) / 1000, 0.05);
            lastTs = ts;
            time += dt * 3; // normalised speed

            ctx.clearRect(0, 0, width, height);

            const cx = width  / 2;
            const cy = height / 2 + 30;
            const sc = Math.min(width, height) / 500; // larger base scale

            const color = `rgba(${Math.round(avatarState.r)},${Math.round(avatarState.g)},${Math.round(avatarState.b)}`;

            // Aura glow
            const aura = avatarState.auraBlur + Math.sin(time + avatarState.auraBreath) * 12;
            ctx.shadowColor = `${color},0.9)`;
            ctx.shadowBlur  = aura;

            // Secondary large ambient aura
            ctx.beginPath();
            ctx.arc(cx, cy - 20 * sc * avatarState.scale, 200 * sc * avatarState.scale, 0, Math.PI * 2);
            ctx.fillStyle = `${color},0.04)`;
            ctx.fill();

            ctx.shadowBlur = 0;

            // Bloom aura ring (expands outward)
            if (avatarState.auraRingAlpha > 0.01) {
                ctx.beginPath();
                ctx.arc(cx, cy - 10 * sc, avatarState.auraRadius * sc, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255,216,158,${avatarState.auraRingAlpha})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            // Bloom particles
            for (const p of particles) {
                if (p.alpha > 0.01) {
                    ctx.beginPath();
                    ctx.arc(cx + p.x, cy + p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,216,158,${p.alpha})`;
                    ctx.fill();
                }
            }

            requestAnimationFrame(drawFrame);
        }
        requestAnimationFrame(drawFrame);

        // ─── Ambient Color Bleed ───────────────────────────────────────
        function setAmbient(rgba) {
            gsap.to(document.documentElement, {
                '--ambient-color': rgba,
                duration: 2.0,
                ease: 'power2.inOut'
            });
        }

        let alarmPulse;
        // ─── Scene 1: Awakening Timeline ──────────────────────────────
        function playAwakening() {
            const sceneEl = document.getElementById('scene-review');
            sceneEl.classList.add('active');
            document.body.classList.add('in-review');

            // Gentle pulsing brightness for the alarm state
            alarmPulse = gsap.fromTo(avatarState, 
                { brightness: 0.8 }, 
                { brightness: 0.35, duration: 2.0, ease: 'sine.inOut', yoyo: true, repeat: -1 }
            );

            const tl = gsap.timeline();
            tl.to(sceneEl, { opacity: 1, duration: 0.6 })
              .from('h1',  { y: 24, opacity: 0, duration: 1.2 },              '-=0.4')
              .from('h2',  { y: 16, opacity: 0, duration: 1.0 },              '-=0.8')
              .to('.dashboard-row', { opacity: 1, x: 0, stagger: 0.6, duration: 0.8 }, '-=0.4')
              .add(() => {
                  // Animate gauges
                  document.querySelectorAll('.gauge-arc').forEach(arc => {
                      const fillPct = parseFloat(arc.getAttribute('data-fill'));
                      const targetValue = parseInt(arc.getAttribute('data-value'));
                      const circum = 2 * Math.PI * 68;
                      gsap.to(arc, { strokeDashoffset: circum * (1 - fillPct), duration: 1.4, ease: 'power3.out' });
                      
                      const textEl = arc.parentNode.querySelector('.gauge-value');
                      const counter = { val: 0 };
                      gsap.to(counter, { val: targetValue, duration: 1.4, ease: 'power3.out', onUpdate: () => {
                          textEl.textContent = Math.round(counter.val);
                      }});
                  });
              })
              .to('.question-card', { opacity: 1, y: 0, stagger: 0.5, duration: 0.8 }, '-=0.2')
              .to('.actions-bottom', { opacity: 1, y: 0, duration: 0.6 },            '+=0.2');
        }

        // ─── Scene 1 → Scene 2 ─────────────────────────────────────────
        function startBiofeedback() {
            const s1 = document.getElementById('scene-review');
            const s2 = document.getElementById('scene-biofeedback');

            s2.classList.add('active');
            setAmbient('rgba(74,200,255,0.08)');

            if (alarmPulse) alarmPulse.kill();

            // Calm the glitch before avatar moves into the box
            gsap.to(avatarState, { glitch: 0, auraBlur: 20, duration: 1.0 });

            const tl = gsap.timeline();
            tl.to(s1, { opacity: 0, y: -8, duration: 0.9, ease: 'power2.in',
                        onComplete: () => {
                            s1.classList.remove('active');
                            document.body.classList.remove('in-review');
                        }})
              .to(s2, { opacity: 1, duration: 1.4, ease: 'emoMirror' }, '-=0.2')
              .call(initChallenge);
        }

        // ─── STOP (mid-challenge) ───────────────────────────────────────
        function stopChallenge() {
            challengeEngine.stop();
            const s2 = document.getElementById('scene-biofeedback');
            const s1 = document.getElementById('scene-review');
            s1.classList.add('active');
            document.body.classList.add('in-review');
            gsap.timeline()
                .to(s2, { opacity: 0, duration: 0.8, ease: 'power2.in',
                           onComplete: () => s2.classList.remove('active') })
                .to(s1, { opacity: 1, duration: 1.0, ease: 'emoMirror' }, '-=0.3');
        }

        // ─── BLOOM ─────────────────────────────────────────────────────
        function triggerBloom(muted) {
            const s2 = document.getElementById('scene-biofeedback');
            const s3 = document.getElementById('scene-bloom');

            challengeEngine.stop();    // stops ticker, releases avatar back to body
            s3.classList.add('active');
            setAmbient(muted ? 'rgba(255,216,158,0.07)' : 'rgba(255,216,158,0.14)');

            const goldBrightness = muted ? 1.1 : 1.4;
            gsap.to(avatarState, { r: 255, g: 216, b: 158, hue: -130, brightness: goldBrightness, duration: 1.2, ease: 'power2.inOut' });
            gsap.to(avatarState, { fillAlpha: 0, strokeAlpha: 0.9, duration: 1.0, ease: 'power2.inOut' });

            // Aura ring expansion
            avatarState.auraRadius = 180;
            avatarState.auraRingAlpha = muted ? 0.2 : 0.4;
            gsap.to(avatarState, { auraRadius: 1000, auraRingAlpha: 0, duration: 2.4, ease: 'expo.out' });

            // Particle burst
            particles.length = 0;
            const count = muted ? 36 : 72;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
                const dist  = 180 + Math.random() * 420;
                particles.push({
                    x: 0, y: 0,
                    tx: Math.cos(angle) * dist,
                    ty: Math.sin(angle) * dist * 0.7,
                    r: 1.5 + Math.random() * 2,
                    alpha: (muted ? 0.5 : 0.85) + Math.random() * 0.15
                });
            }
            particles.forEach((p, i) => {
                gsap.to(p, {
                    x: p.tx, y: p.ty,
                    alpha: 0, r: 0,
                    duration: 1.8 + Math.random() * 0.6,
                    ease: 'expo.out',
                    delay: i * 0.008
                });
            });

            // Update bloom text based on win type
            const headline = document.getElementById('bloom-headline');
            const sub      = document.getElementById('bloom-sub');
            if (muted) {
                if (headline) headline.textContent = 'You showed up. That counts.';
                if (sub)      sub.textContent      = 'Even a few mindful breaths make a difference. Enjoy the rest of your day.';
            } else {
                if (headline) headline.textContent = 'You have reached calm.';
                if (sub)      sub.textContent      = 'Your nervous system has settled. Carry this stillness with you.';
            }

            const tl = gsap.timeline();
            tl.to(s2,  { opacity: 0, duration: 1.0, ease: 'power2.in',
                          onComplete: () => s2.classList.remove('active') })
              .to(s3,  { opacity: 1, duration: 1.6, ease: 'emoMirror' },       '-=0.4')
              .to('#bloom-headline', { y: 0, opacity: 1, duration: 1.4, ease: 'emoMirror' }, '-=0.6')
              .to('#bloom-sub',        { opacity: 1, y: 0, duration: 1.0, ease: 'power3.out' }, '-=0.2')
              .to('#bloom-return-btn', { opacity: 1, duration: 0.8, ease: 'power2.out' },        '+=0.4');
        }

        // ─── Return to Review from Bloom ────────────────────────────────
        function returnToReview() {
            const s3 = document.getElementById('scene-bloom');
            const s1 = document.getElementById('scene-review');
            s1.classList.add('active');
            document.body.classList.add('in-review');
            // Reset bloom opacity for next time
            gsap.set(['#bloom-headline', '#bloom-sub', '#bloom-return-btn'], { opacity: 0 });
            gsap.timeline()
                .to(s3, { opacity: 0, duration: 0.8, ease: 'power2.in',
                          onComplete: () => s3.classList.remove('active') })
                .to(s1, { opacity: 1, duration: 1.0, ease: 'emoMirror' }, '-=0.3');
        }

        // ─── Dismiss ───────────────────────────────────────────────────
        function dismiss() {
            gsap.to('#scene-review', { opacity: 0, duration: 0.8, ease: 'power2.in',
                onComplete: () => { document.getElementById('scene-review').classList.remove('active'); document.body.classList.remove('in-review'); } });
        }

        // ─── Demo Mode (D key) — jump into challenge with 'success' mock ──
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'd' && e.key !== 'D') return;
            gsap.to('#demo-chip', { opacity: 1, duration: 0.4 });
            biosignalSource.setMockProfile('success');

            const s1 = document.getElementById('scene-review');
            if (parseFloat(gsap.getProperty(s1, 'opacity')) > 0.1) {
                startBiofeedback();
            }
        });

        // ─── Challenge Engine ──────────────────────────────────────────
        // Encapsulates all biofeedback challenge state: box breathing phase
        // state machine, RSA computation, HP bar updates, tip rotation, win/loss.
        const challengeEngine = (() => {
            // 4-4-6-2 phases (Inhale · Hold · Exhale · Hold)
            const PHASES = [
                { name: 'inhale',    dur: 4, label: 'label-top',    count: 'count-top'    },
                { name: 'hold_top',  dur: 4, label: 'label-right',  count: 'count-right'  },
                { name: 'exhale',    dur: 6, label: 'label-bottom', count: 'count-bottom' },
                { name: 'hold_bot',  dur: 2, label: 'label-left',   count: 'count-left'   },
            ];

            const CHALLENGE_DURATION_MS = 3 * 60 * 1000; // 3 min
            const WIN_HOLD_MS           = 30_000;         // 30s continuous above target
            const WIN_ARC_CIRCUM        = 100.5;

            // Avatar scale targets per phase
            const SCALE = { inhale: 1.12, hold_top: 1.12, exhale: 0.94, hold_bot: 0.94 };

            // Color stops (r,g,b) indexed by HP bucket (0-2)
            const COLORS = [
                { r: 255, g: 60,  b: 48  },  // 0–33% → red
                { r: 255, g: 180, b: 80  },  // 33–66% → amber
                { r: 74,  g: 200, b: 255 },  // 66–<100% → cyan
            ];

            let _phaseIdx      = 0;
            let _phaseSecsLeft = 0;
            let _ticker        = null; // 1Hz interval
            let _liveTimer     = null; // 100ms visual refresh
            let _dotTween      = null;
            let _tipTimer      = null;
            let _startTime     = 0;
            let _winHoldStart  = null; // timestamp when user first crossed target
            let _won           = false;
            let _baseline      = null;
            let _target        = null;
            let _lastHR        = null;
            let _displayRSA    = 0;
            let _running       = false;
            let _currentTip    = '';

            // Cycle-amplitude RSA: tracks inhale peak and exhale trough per cycle,
            // averages last 3 completed cycles. No sticky-max problem.
            let _inhalePeak   = null;
            let _exhaleValley = null;
            let _cycleAmps    = [];
            let _confirmedRSA = 0;

            // ── DOM refs (resolved at init) ──────────────────────────────
            let _els = {};

            function _resolveEls() {
                _els = {
                    dot:       document.getElementById('breath-dot'),
                    rect:      document.getElementById('breath-rect'),
                    fill:      document.getElementById('hp-bar-fill'),
                    targetLine:document.getElementById('hp-target-line'),
                    winArc:    document.getElementById('hp-win-arc'),
                    winCircle: document.getElementById('hp-win-circle'),
                    valueText: document.getElementById('hp-value-text'),
                    tipEl:     document.getElementById('bf-tip'),
                    box:       document.getElementById('breath-box-wrap'),
                };
            }

            // Move avatar + glitch clones into the box so they share scale/glow
            function _adoptAvatar() {
                const box = document.getElementById('breath-box-wrap');
                [figureEl, glitchR, glitchB].forEach(el => box.appendChild(el));
            }

            function _releaseAvatar() {
                const body = document.body;
                // Re-insert before ui-layer so z-index stack is preserved
                const uiLayer = document.getElementById('ui-layer');
                [figureEl, glitchR, glitchB].forEach(el => body.insertBefore(el, uiLayer));
                // Restore fixed positioning (overridden by box CSS while inside)
                figureEl.style.cssText = '';
                glitchR.style.cssText  = '';
                glitchB.style.cssText  = '';
            }

            // ── Box path: returns SVG [x,y] for normalised t ∈ [0,1] ────
            // Perimeter: top(0→1), right(1→2), bottom(2→3), left(3→4)
            // Each side = 380px at scale of viewBox 400x400, margin 10px
            const PAD  = 10;
            const SIDE = 380;

            function _pathPoint(t) {
                const perim = t * 4; // 0–4 = full lap
                if (perim < 1) {
                    // Top: left→right
                    return { x: PAD + perim * SIDE, y: PAD };
                } else if (perim < 2) {
                    // Right: top→bottom
                    return { x: PAD + SIDE, y: PAD + (perim - 1) * SIDE };
                } else if (perim < 3) {
                    // Bottom: right→left
                    return { x: PAD + SIDE - (perim - 2) * SIDE, y: PAD + SIDE };
                } else {
                    // Left: bottom→top
                    return { x: PAD, y: PAD + SIDE - (perim - 3) * SIDE };
                }
            }

            // Dot starts at midpoint of the top side (Inhale)
            let _lapT = 0; // 0→1 across the full perimeter, per phase

            // ── RSA computation (per-cycle amplitude) ────────────────────
            // Track peak during inhale, trough during exhale.
            // On exhale end: record amplitude, average last 3 cycles.
            // Between cycle completions: show a live preview during exhale
            // (inhale peak − current HR) so the bar isn't frozen mid-cycle.

            function _onNewHR({ hr }) {
                if (!_running) return;
                _lastHR = hr;
                const phase = PHASES[_phaseIdx].name;
                if (phase === 'inhale' || phase === 'hold_top') {
                    if (_inhalePeak === null || hr > _inhalePeak) _inhalePeak = hr;
                }
                if (phase === 'exhale' || phase === 'hold_bot') {
                    if (_exhaleValley === null || hr < _exhaleValley) _exhaleValley = hr;
                }
            }

            function _recordCycle() {
                if (_inhalePeak !== null && _exhaleValley !== null) {
                    const amp = Math.max(0, _inhalePeak - _exhaleValley);
                    _cycleAmps.push(amp);
                    if (_cycleAmps.length > 3) _cycleAmps.shift();
                    _confirmedRSA = _cycleAmps.reduce((a, b) => a + b, 0) / _cycleAmps.length;
                }
                _inhalePeak   = null;
                _exhaleValley = null;
            }

            // ── 100ms visual refresh loop ────────────────────────────────
            function _liveUpdate() {
                if (!_running) return;
                const phase = PHASES[_phaseIdx].name;
                let target = _confirmedRSA;

                // During exhale: show live preview (inhale peak − current HR)
                // so bar climbs in real time rather than waiting for cycle end.
                // Cap at _confirmedRSA * 1.5 to prevent over-promising.
                if ((phase === 'exhale') && _inhalePeak !== null && _lastHR !== null) {
                    const liveGap = Math.max(0, _inhalePeak - _lastHR);
                    target = Math.max(_confirmedRSA, Math.min(liveGap, _confirmedRSA + 4));
                }

                _displayRSA += (target - _displayRSA) * 0.12;
                _updateBar(_displayRSA);
            }

            // ── HP bar update ────────────────────────────────────────────
            // rsaValue: optional live estimate; defaults to _lastRSA
            function _updateBar(rsaValue) {
                const fill = _els.fill;
                const rsa        = (rsaValue !== undefined) ? rsaValue : _displayRSA;
                const pct        = _target > 0 ? rsa / _target : 0;
                const pctClamped = Math.max(0, Math.min(1.0, pct)); // hard cap at 100% visually

                // Bar height — short tween so it feels live but not jittery
                gsap.to(fill, { height: `${pctClamped * 100}%`, duration: 0.4, ease: 'power2.out', overwrite: 'auto' });

                // Color
                let color;
                if (pctClamped >= 1.0) {
                    color = '#4CD964'; // green
                    fill.classList.add('at-target');
                } else {
                    fill.classList.remove('at-target');
                    if (pctClamped < 0.33) color = '#FF3B30';
                    else if (pctClamped < 0.66) color = '#FFD89E';
                    else color = '#4AC8FF';
                }
                fill.style.background = color;

                // Avatar color (slow 1.5s tween)
                let cIdx = pctClamped >= 1.0 ? -1 : Math.min(2, Math.floor(pctClamped / 0.33));
                if (pctClamped >= 1.0) {
                    gsap.to(avatarState, { r: 255, g: 216, b: 158, hue: -130, brightness: 1.3, duration: 1.5, overwrite: 'auto' });
                } else {
                    const c = COLORS[Math.max(0, cIdx)];
                    gsap.to(avatarState, { r: c.r, g: c.g, b: c.b, hue: cIdx < 1 ? 0 : -40, brightness: 1.0, duration: 1.5, overwrite: 'auto' });
                }

                // Box stroke color
                if (_els.rect) _els.rect.style.stroke = color + 'AA';
                if (_els.dot)  _els.dot.style.fill    = color;

                // Value text — show live estimate
                if (_els.valueText) {
                    _els.valueText.textContent = rsa > 0
                        ? `${rsa.toFixed(1)} bpm swing`
                        : '— bpm';
                }

                // Win-hold arc
                _updateWinArc(pctClamped);
            }

            function _updateWinArc(pct) {
                if (pct < 1.0) {
                    _winHoldStart = null;
                    if (_els.winArc) _els.winArc.style.display = 'none';
                    return;
                }
                const now = Date.now();
                if (!_winHoldStart) _winHoldStart = now;

                const held    = now - _winHoldStart;
                const arcFill = Math.min(1, held / WIN_HOLD_MS);

                if (_els.winArc) _els.winArc.style.display = 'block';
                if (_els.winCircle) {
                    _els.winCircle.style.strokeDashoffset =
                        WIN_ARC_CIRCUM * (1 - arcFill);
                }

                if (held >= WIN_HOLD_MS && !_won) {
                    _won = true;
                    triggerBloom(false);
                }
            }

            // ── Phase state machine ──────────────────────────────────────
            function _onPhaseTick() {
                // Timeout check
                if (!_won && Date.now() - _startTime > CHALLENGE_DURATION_MS) {
                    _won = true;
                    triggerBloom(true);
                    return;
                }

                _phaseSecsLeft--;
                // Update peripheral countdown
                const countEl = document.getElementById(PHASES[_phaseIdx].count);
                if (countEl) countEl.textContent = _phaseSecsLeft > 0 ? _phaseSecsLeft : '';

                if (_phaseSecsLeft <= 0) _advancePhase();
            }

            function _advancePhase() {
                // Seal the cycle when exhale ends (moving into hold_bot)
                if (PHASES[_phaseIdx].name === 'exhale') _recordCycle();

                _phaseIdx = (_phaseIdx + 1) % PHASES.length;
                const phase = PHASES[_phaseIdx];
                _phaseSecsLeft = phase.dur;

                // Update label highlights
                PHASES.forEach((p, i) => {
                    const el = document.getElementById(p.label);
                    if (el) el.classList.toggle('active-label', i === _phaseIdx);
                });

                // Avatar scale tween
                const scaleTarget = SCALE[phase.name];
                const ease = phase.name === 'inhale' ? 'power2.out'
                           : phase.name === 'exhale' ? 'power2.inOut' : 'none';
                gsap.to(avatarState, { scale: scaleTarget, duration: phase.dur * 0.9, ease });

                // Dot tween to next corner
                if (_dotTween) _dotTween.kill();
                const startT = _phaseIdx / 4;
                const endT   = (_phaseIdx + 1) / 4;
                const startPt = _pathPoint(startT);
                const endPt   = _pathPoint(endT);

                // Tween dot along straight side (MotionPath not needed — sides are straight)
                _dotTween = gsap.to(_els.dot, {
                    attr: { cx: endPt.x, cy: endPt.y },
                    duration: phase.dur,
                    ease: 'none',
                    onStart: () => {
                        // Position dot at start of this side
                        gsap.set(_els.dot, { attr: { cx: startPt.x, cy: startPt.y } });
                    }
                });

                // Update bar
                _updateBar();
            }

            // ── Tip rotation ─────────────────────────────────────────────
            function _rotateTip() {
                const next = pickNextTip(_currentTip, null);
                _currentTip = next;
                const el = _els.tipEl;
                if (!el) return;
                gsap.timeline()
                    .to(el, { opacity: 0, y: -8, duration: 0.6, ease: 'power2.in' })
                    .call(() => { el.textContent = next; })
                    .to(el, { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' });
            }

            // ── Box breathing quotes ──────────────────────────────────────
            const QUOTES = [
                { text: '"Breath is the bridge which connects life to consciousness."', author: '— Thich Nhat Hanh' },
                { text: '"Almost everything will work again if you unplug it for a few minutes, including you."', author: '— Anne Lamott' },
                { text: '"When you own your breath, nobody can steal your peace."', author: '— Unknown' },
                { text: '"The nose is for breathing, the mouth is for eating."', author: '— Proverb' },
                { text: '"Within you, there is a stillness and a sanctuary to which you can retreat at any time."', author: '— Hermann Hesse' },
                { text: '"Feelings come and go like clouds in a windy sky. Conscious breathing is my anchor."', author: '— Thich Nhat Hanh' },
                { text: '"Breathe. Let go. And remind yourself that this very moment is the only one you know you have for sure."', author: '— Oprah Winfrey' },
            ];
            let _quoteIdx = -1;

            function _rotateQuote() {
                _quoteIdx = (_quoteIdx + 1) % QUOTES.length;
                const q        = QUOTES[_quoteIdx];
                const textEl   = document.getElementById('bf-quote');
                const authorEl = document.getElementById('bf-quote-author');
                if (!textEl) return;
                gsap.timeline()
                    .to([textEl, authorEl], { opacity: 0, y: -8, duration: 0.6, ease: 'power2.in' })
                    .call(() => {
                        textEl.textContent   = q.text;
                        if (authorEl) authorEl.textContent = q.author;
                    })
                    .to([textEl, authorEl], { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out' });
            }

            // ── Public API ────────────────────────────────────────────────
            return {
                start() {
                    _resolveEls();
                    _adoptAvatar();
                    _running      = true;
                    _phaseIdx     = 0;
                    _phaseSecsLeft= PHASES[0].dur;
                    _startTime    = Date.now();
                    _winHoldStart = null;
                    _won          = false;
                    _inhalePeak   = null;
                    _exhaleValley = null;
                    _cycleAmps    = [];
                    _confirmedRSA = 0;
                    _displayRSA   = 0;

                    _baseline = 0;
                    _target   = 6; // bpm swing target, calibrated for smoothed EmotiBit HR
                    // Target line sits at 100% fill (top of bar)
                    const targetPct = 100;
                    if (_els.targetLine) _els.targetLine.style.bottom = targetPct + '%';
                    if (_els.winArc)     _els.winArc.style.bottom     = `calc(${targetPct}% - 20px)`;

                    // Set initial dot position (start of top/inhale side)
                    const pt = _pathPoint(0);
                    gsap.set(_els.dot, { attr: { cx: pt.x, cy: pt.y } });

                    // Activate first label
                    PHASES.forEach((p, i) => {
                        const el = document.getElementById(p.label);
                        if (el) el.classList.toggle('active-label', i === 0);
                    });

                    // Start dot traversal for first phase
                    const firstPhase = PHASES[0];
                    const endPt = _pathPoint(1/4);
                    _dotTween = gsap.to(_els.dot, {
                        attr: { cx: endPt.x, cy: endPt.y },
                        duration: firstPhase.dur,
                        ease: 'none',
                    });

                    // Avatar scale for inhale
                    gsap.to(avatarState, { scale: SCALE.inhale, duration: firstPhase.dur * 0.9, ease: 'power2.out' });

                    // Subscribe to biosignal
                    biosignalSource.subscribe(_onNewHR);

                    // Phase ticker (1 Hz)
                    _ticker = setInterval(_onPhaseTick, 1000);

                    // 100ms visual refresh for the HP bar
                    _displayRSA = 0;
                    _liveTimer = setInterval(_liveUpdate, 100);

                    // Somatic tip rotation (20s)
                    _currentTip = '';
                    _rotateTip();
                    _tipTimer = setInterval(_rotateTip, 20_000);

                    // Box breathing quote rotation (25s offset so they don't fire together)
                    _rotateQuote();
                    setTimeout(() => {
                        _rotateQuote();
                        setInterval(_rotateQuote, 25_000);
                    }, 12_500);
                },

                stop() {
                    _running = false;
                    if (_ticker)    { clearInterval(_ticker);    _ticker    = null; }
                    if (_liveTimer) { clearInterval(_liveTimer); _liveTimer = null; }
                    if (_tipTimer)  { clearInterval(_tipTimer);  _tipTimer  = null; }
                    if (_dotTween)  { _dotTween.kill(); _dotTween = null; }
                    biosignalSource.unsubscribe(_onNewHR);
                    gsap.to(avatarState, { scale: 1.0, duration: 0.8 });
                    _releaseAvatar();
                }
            };
        })();

        // ─── initChallenge — called after scene fade-in ─────────────────
        function initChallenge() {
            challengeEngine.start();
        }

        // ─── Daily Review JS ───────────────────────────────────────────
        async function loadReview() {
            try {
                // Try fetch first (if on server)
                const res = await fetch('./review.json');
                if (res.ok) {
                    const data = await res.json();
                    renderDashboards(data);
                    renderQuestions(data);
                    
                    // Update tagline
                    const h2 = document.querySelector('#scene-review h2');
                    if (h2 && data.summary && data.summary.tagline) {
                        h2.textContent = data.summary.tagline;
                    }
                    return;
                }
            } catch (e) {
                console.warn("Fetch failed (likely CORS on file://), falling back to review_data.js");
            }
            // Fallback
            if (typeof reviewDataObj !== 'undefined') {
                renderDashboards(reviewDataObj);
                renderQuestions(reviewDataObj);
                
                // Update tagline
                const h2 = document.querySelector('#scene-review h2');
                if (h2 && reviewDataObj.summary && reviewDataObj.summary.tagline) {
                    h2.textContent = reviewDataObj.summary.tagline;
                }
            } else {
                console.error("No review data available.");
            }
        }

        function renderDashboards(data) {
            const container = document.getElementById('dashboards-container');
            container.innerHTML = '';
            
            const metrics = ['cardio', 'stress'];
            const colors = { cardio: 'var(--state-storm)', stress: 'var(--state-calming)' };
            
            metrics.forEach(m => {
                const d = data.dashboards[m];
                if (!d) return;
                
                // Build SVG sparkline
                const points = d.curve.map((pt, i) => `${(i / Math.max(1, d.curve.length - 1)) * 300},${110 - (pt.v / 100 * 110)}`).join(' ');
                const baselineY = 110 - (d.baseline_line / 100 * 110);
                
                let highlightsHtml = '';
                let circlesHtml = '';
                d.highlights.forEach(hl => {
                    const idx = hl.start_idx || 0; // approximate
                    const x = (idx / 288) * 300;
                    circlesHtml += `<circle class="highlight-circle" cx="${x}" cy="${110 - (hl.peak / 100 * 110)}" style="color: ${colors[m]}"></circle>`;
                    highlightsHtml += `<div class="highlight-callout">
                        <span style="color:${colors[m]}">•</span> ${hl.start} - ${hl.end} | +${hl.pct_above_mean}% (${hl.duration_min} min)
                    </div>`;
                });
                
                const gaugeCircum = 2 * Math.PI * 68;
                const sign = d.gauge.delta_pct > 20 ? 'positive' : (d.gauge.delta_pct < -5 ? 'negative' : 'neutral');
                const signChar = d.gauge.delta_pct > 0 ? '+' : '';
                
                let meaningText = '';
                let meaningColor = '';
                const delta = d.gauge.delta_pct;
                const noun = (m === 'cardio') ? 'Load' : 'Stress';

                if (delta < -15) {
                    meaningText = 'Low ' + noun;
                    meaningColor = '#4AC8FF'; // Cool blue for low
                } else if (delta <= 15) {
                    meaningText = 'Normal ' + noun;
                    meaningColor = '#4cd964'; // Green for normal/baseline
                } else if (delta <= 40) {
                    meaningText = 'High ' + noun;
                    meaningColor = '#ffcc00'; // Amber for high
                } else {
                    meaningText = 'Extreme ' + noun;
                    meaningColor = '#ff3b30'; // Red for extreme
                }
                
                const html = `
                    <div class="dashboard-row" data-metric="${m}">
                        <div class="chart-block">
                            <div class="chart-label" style="border: 1px solid ${colors[m]}; color: ${colors[m]}">${d.label}</div>
                            <svg class="sparkline" viewBox="0 0 300 110" preserveAspectRatio="none">
                                <line x1="0" y1="${baselineY}" x2="300" y2="${baselineY}" stroke="rgba(255,255,255,0.2)" stroke-dasharray="4 4" stroke-width="1"></line>
                                <polyline points="${points}" fill="none" stroke="${colors[m]}" stroke-width="2" stroke-linejoin="round"></polyline>
                                ${circlesHtml}
                            </svg>
                            <div class="highlight-list">${highlightsHtml}</div>
                        </div>
                        <div class="gauge-block">
                            <svg class="radial-gauge">
                                <circle cx="80" cy="80" r="68" stroke="rgba(255,255,255,0.08)" stroke-width="8" fill="none"></circle>
                                <circle class="gauge-arc" data-fill="${d.gauge.fill_pct}" data-value="${d.gauge.value}" cx="80" cy="80" r="68" stroke="${colors[m]}" stroke-width="8" stroke-linecap="round" fill="none" stroke-dasharray="${gaugeCircum}" stroke-dashoffset="${gaugeCircum}" transform="rotate(-90 80 80)"></circle>
                                <text class="gauge-value" x="80" y="75">0</text>
                                <text class="gauge-label" x="80" y="100">avg score</text>
                            </svg>
                            <div class="gauge-meaning" style="font-size: 0.85rem; letter-spacing: 0.05em; margin-top: -8px; color: ${meaningColor}; text-align: center;">${meaningText}</div>
                            <div class="gauge-delta ${sign}">${signChar}${d.gauge.delta_pct}% vs week</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }
        
        function renderQuestions(data) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            data.questions.forEach((q, i) => {
                const html = `
                    <div class="question-card" id="q-${i}">
                        <div class="q-text">${q.text}</div>
                        <div class="q-input-wrap">
                            <textarea class="q-input" placeholder="Reflect here..."></textarea>
                            <button class="mic-btn" onclick="mockMic(this)" aria-label="Use voice input">
                                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                            </button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }
        
        function mockMic(btn) {
            const card = btn.closest('.question-card');
            const input = card.querySelector('.q-input');
            
            gsap.to(btn, { scale: 1.2, duration: 0.1, yoyo: true, repeat: 3 });
            
            setTimeout(() => {
                input.value = "I went for a run.";
                const pending = JSON.parse(localStorage.getItem('pendingAnswers') || '[]');
                pending.push({ date: new Date().toISOString(), text: input.value });
                localStorage.setItem('pendingAnswers', JSON.stringify(pending));
            }, 1000);
        }

        // ─── Boot ──────────────────────────────────────────────────────
        // Initial avatar state: STORM — holographic wireframe look from the start
        Object.assign(avatarState, { r: 74, g: 180, b: 255, hue: -140, brightness: 0.8, fillAlpha: 0.9, strokeAlpha: 0, glitch: 10, auraBlur: 40 });
        setAmbient('rgba(74,180,255,0.08)');

        window.addEventListener('DOMContentLoaded', async () => {
            await loadReview();
            playAwakening();
        });
    </script>
</body>
</html>
